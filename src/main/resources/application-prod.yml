spring:
  sql:
    init:
      mode: always   # 항상 data.sql 실행 # 위험한 옵션!! 개발 DB가 모두 날라갈수 있음으로 주의!
      schema-locations: classpath:hrbank_schema_latest_erd.sql
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/my_blog}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:user1}
    password: ${DATABASE_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off
    org.springframework.web: info

server:
  port: ${PORT:8080}