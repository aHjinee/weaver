spring:
  sql:
    init:
#      mode: always   # 항상 data.sql 실행 # 위험한 옵션!! 개발 DB가 모두 날라갈수 있음으로 주의!
      schema-locations: classpath:hrbank_schema_latest_erd.sql
      data-locations: classpath:data.sql
  config:
    activate:
      on-profile: dev

  datasource:

    # 인메모리 (권장)
    #    url: jdbc:h2:mem:blogdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    # 임베디드 (data가 넣어지지 않음)
    #    url: jdbc:h2:file:./data/blogdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE
    # 서버모드 -> h2 DB 실행 필요
    #    url: jdbc:h2:tcp://localhost:9092/~/blogdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
#    url: jdbc:postgresql://localhost:5432/waever1
#    driver-class-name: org.postgresql.Driver
    url: jdbc:h2:mem:weaverdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: postgres
    password: 1234

  jpa:
    hibernate:
      ddl-auto: none #create-drop #update

  h2:
    console:
      enabled: true # 웹 콘솔 활성화
      path: /h2-console # 접속 URL: http://localhost:8080/h2-console
      # jdbc:h2:mem:blogdb
      # jdbc:h2:file:./data/blogdb


logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.hibernate.type.descriptor.sql: trace
